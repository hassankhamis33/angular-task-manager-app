services:
  # Angular Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: angular-task-manager-dev
    ports:
      - "4200:4200"
      - "9876:9876"  # Karma test runner
    environment:
      - NODE_ENV=development
      - ANGULAR_CLI_ANALYTICS=false
      - CI=true
    volumes:
      # Mount source code for live editing
      - ./src:/app/src
      - ./angular.json:/app/angular.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./karma.conf.js:/app/karma.conf.js
      - node_modules:/app/node_modules  # Named volume for node_modules
    working_dir: /app
    command: npm start -- --host 0.0.0.0 --poll=2000
    restart: unless-stopped
    networks:
      - app-network
    stdin_open: true
    tty: true

volumes:
  node_modules:

networks:
  app-network:
    driver: bridge
